general:
  use_millisec: on
  dev_pool_size: 0.01

linear_system:
  rhs_filename: data/ps3d10pt7/np4/IJ.out.b
  matrix_filename: data/ps3d10pt7/np4/IJ.out.A

solver: pcg

preconditioner:
  schwarz:
    variant: ras-iluk
    overlap: 1
    local_solver_type: iluk
    iluk_level_of_fill: 4
    max_iter: 1
    print_level: 0
