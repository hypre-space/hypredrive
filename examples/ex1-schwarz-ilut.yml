general:
  use_millisec: on
  dev_pool_size: 0.01

linear_system:
  rhs_filename: data/ps3d10pt7/np1/IJ.out.b
  matrix_filename: data/ps3d10pt7/np1/IJ.out.A

solver: pcg

preconditioner:
  schwarz:
    variant: ras-ilut
    overlap: 1
    local_solver_type: ilut
    ilut_max_nnz_row: 1000
    ilut_droptol: 1.0e-2
    max_iter: 1
    print_level: 0
