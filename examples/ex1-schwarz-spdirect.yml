general:
  use_millisec: on
  dev_pool_size: 0.01

linear_system:
  rhs_filename: data/ps3d10pt7/np1/IJ.out.b
  matrix_filename: data/ps3d10pt7/np1/IJ.out.A

solver: pcg

preconditioner:
  schwarz:
    variant: ras-spdirect
    overlap: 1
    local_solver_type: spdirect
    max_iter: 1
    print_level: 0
