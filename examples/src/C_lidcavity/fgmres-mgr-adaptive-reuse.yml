general:
  name: lidcavity-adaptive-reuse

linear_system:
  dof_labels:
    v_x: 0
    v_y: 1
    p: 2

solver:
  fgmres:
    max_iter: 200
    krylov_dim: 200
    print_level: 0
    relative_tol: 1.0e-6

preconditioner:
  reuse:
    enabled: yes
    type: adaptive
    guards:
      min_history_points: 2
      min_reuse_solves: 1
    adaptive:
      rebuild_threshold: 0.5
      components:
        - name: solve-time-floor
          metric: solve_time
          target: 1.0e-12
          scale: 1.0e-12
          mean:
            kind: arithmetic
          transform:
            kind: raw
          history:
            source: linear_solves
            max_points: 2
  mgr:
    tolerance: 0.0
    max_iter: 1
    print_level: 0
    coarse_th: 0.0
    level:
      0:
        f_dofs: [v_x, v_y]
        f_relaxation:
          amg:
            print_level: 0
            max_iter: 1
            coarsening:
              strong_th: 0.5
              num_functions: 2
        g_relaxation: none
        restriction_type: injection
        prolongation_type: blk-absrowsum
        coarse_level_type: galerkin

    coarsest_level:
      amg:
        max_iter: 1
        print_level: 0
        coarsening:
          strong_th: 0.9
          num_functions: 1
