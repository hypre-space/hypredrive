name: Code Style

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
    paths:
      - 'include/**'
      - 'src/**'
      - 'examples/src/**'
      - 'scripts/check_private_prefix.sh'
      - 'scripts/list_public_apis.sh'
      - '.clang-format'
  push:
    branches: [ master ]
    paths:
      - 'include/**'
      - 'src/**'
      - 'examples/src/**'
      - 'scripts/check_private_prefix.sh'
      - 'scripts/list_public_apis.sh'
      - '.clang-format'
  workflow_dispatch:    # Allow manual triggering

jobs:
  format:
    if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'Run CI') }}
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install clang-format
        timeout-minutes: 3
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: clang-format check
        run: |
          set -euxo pipefail
          find include src examples/src -type f \( -name "*.c" -o -name "*.h" \) | \
            xargs clang-format -n --Werror

  private-prefix:
    if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'Run CI') }}
    name: private prefix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: private prefix check
        run: bash scripts/check_private_prefix.sh

  public-apis:
    if: ${{ github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'Run CI') }}
    name: public APIs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: public API prefix check
        run: bash scripts/list_public_apis.sh --check
